name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "profile/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true&include_all_commits=true&count_private=true&title_color=e6edf3&text_color=8b949e&icon_color=8b949e&hide_title=true&hide_rank=true
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true&include_all_commits=true&count_private=true&title_color=24292f&text_color=57606a&icon_color=57606a&hide_title=true&hide_rank=true
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=transparent&hide_border=true&title_color=e6edf3&text_color=8b949e
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=transparent&hide_border=true&title_color=24292f&text_color=57606a
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "Meta-Develop"
          git config user.email "rikuuyoo@gmail.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
